services:
  silverman-blog-linkedin-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_REVISION: ${BUILD_REVISION:-unknown}
    image: silverman-blog-linkedin-worker:local
    container_name: silverman-blog-linkedin-worker
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      SILVERMAN_BLOG_LINKEDIN_BASE_PATH: /data/silverman-blog-linkedin
      SILVERMAN_GITHUB_PAGES_REPO_PATH: /public-blog
      SILVERMAN_SITE_URL: ${SILVERMAN_SITE_URL:-https://silverman.pro}
      # Calendar SoT: Postgres DB silverman_linkedin_db (not editorial mount files).
      # Set in .env — never commit credentials. Example:
      # SILVERMAN_CALENDAR_DATABASE_URL=postgresql://silverman_linkedin:***@postgres:5432/silverman_linkedin_db
      SILVERMAN_CALENDAR_DATABASE_URL: ${SILVERMAN_CALENDAR_DATABASE_URL:-}
      PORT: "8000"
    volumes:
      # Editorial data MUST NOT share the code sync checkout (rsync --delete risk).
      - /home/silverman/silverman-blog-linkedin-worker/data/silverman-blog-linkedin:/data/silverman-blog-linkedin
      - ${SILVERMAN_PUBLIC_BLOG_REPO_PATH:-/home/silverman/silverberdi.github.io}:/public-blog
      # Git publication SSH — read-only file mounts (no broad /secrets directory mount)
      - /home/silverman/silverman-blog-linkedin-worker/secrets/github-pages-deploy-key:/secrets/github-pages-deploy-key:ro
      - /home/silverman/silverman-blog-linkedin-worker/secrets/known_hosts:/secrets/known_hosts:ro
      # LinkedIn OAuth — writable directory mount (file-level binds break atomic rename)
      - /home/silverman/silverman-blog-linkedin-worker/secrets/linkedin-oauth:/secrets/linkedin-oauth
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Reach n8n production webhooks on the compose DNS name `n8n` (bypasses
    # gateway /webhook/ Avatares API-key gate used by public 192.168.0.194:5678).
    networks:
      - default
      - local-ai-stack_backend

networks:
  local-ai-stack_backend:
    external: true
