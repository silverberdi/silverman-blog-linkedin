# Fallback static config used only if the entrypoint template is missing.
# Preferred path: nginx.conf.template + docker-entrypoint.sh (US-099 private hop).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
